name: Global Deployment (Back & Front)

on:
  push:
    branches: [ main ]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Auth Google Cloud
        uses: 'google-github-actions/auth@v1'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - name: Build and Deploy Backend
        run: |
          gcloud auth configure-docker
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/purchase-backend ./backend
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/purchase-backend
          gcloud run deploy purchase-api --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/purchase-backend --region us-central1 --allow-unauthenticated

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend # Starts after backend is ready
    steps:
      - uses: actions/checkout@v3
      - name: Auth Google Cloud
        uses: 'google-github-actions/auth@v1'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - name: Build and Deploy Frontend
        run: |
          gcloud auth configure-docker
          IMAGE=gcr.io/${{ secrets.GCP_PROJECT_ID }}/purchase-frontend:${{ github.sha }}
          docker build --no-cache -t $IMAGE ./frontend
          docker push $IMAGE
          # Get project ID number and build backend URL using the full Cloud Run pattern
          PROJECT_NUMBER=$(gcloud projects describe ${{ secrets.GCP_PROJECT_ID }} --format='value(projectNumber)')
          BACKEND_URL="https://purchase-api-${PROJECT_NUMBER}.us-central1.run.app"
          echo "Backend URL: $BACKEND_URL"
          gcloud run deploy purchase-web --image $IMAGE --region us-central1 --allow-unauthenticated --set-env-vars BACKEND_URL=$BACKEND_URL
