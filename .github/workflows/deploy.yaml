name: Deploy to Google Cloud Run

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Auth Google Cloud
        uses: 'google-github-actions/auth@v1'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Build and Push Container
        run: |
          gcloud auth configure-docker
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/purchase-app .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/purchase-app

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy purchase-app \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/purchase-app \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated